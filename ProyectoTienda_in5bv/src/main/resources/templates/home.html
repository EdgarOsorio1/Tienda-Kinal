<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | ProyectoTienda</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --bg-dark: #0f172a;
            --bg-sidebar: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --card-bg: #1e293b;
            --danger: #ef4444;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
            background-image:
                radial-gradient(circle at 0% 0%, rgba(59, 130, 246, 0.03) 0%, transparent 50%);
        }

        /* --- SIDEBAR (Menú Lateral) --- */
        .sidenav {
            height: 100%;
            width: 0;
            position: fixed;
            z-index: 1000;
            top: 0;
            left: 0;
            background-color: var(--bg-sidebar);
            overflow-x: hidden;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
            border-right: 1px solid rgba(255,255,255,0.05);
        }

        .sidebar-header {
            padding: 30px 25px;
            font-size: 20px;
            font-weight: 800;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 20px;
        }

        .sidenav a {
            padding: 15px 25px;
            text-decoration: none;
            font-size: 15px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 15px;
            transition: var(--transition);
            border-left: 4px solid transparent;
        }

        .sidenav a:hover {
            color: var(--text-main);
            background: rgba(59, 130, 246, 0.1);
            border-left: 4px solid var(--primary);
        }

        .closebtn {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 22px !important;
            color: var(--text-muted) !important;
            padding: 5px !important;
        }

        /* --- CONTENIDO PRINCIPAL --- */
        #main {
            transition: margin-left .5s;
            min-height: 100vh;
        }

        .top-bar {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(12px);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 900;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .open-btn {
            background: var(--bg-sidebar);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-main);
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: var(--transition);
        }

        .open-btn:hover {
            background: var(--primary);
            border-color: var(--primary);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            font-weight: 500;
        }

        .user-info span b { color: var(--primary); }

        /* --- TARJETAS Y CONTENIDO --- */
        .content-area {
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(90deg, var(--primary), #818cf8);
        }

        .card h2 {
            font-size: 26px;
            margin-bottom: 15px;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .card p {
            color: var(--text-muted);
            line-height: 1.7;
            font-size: 16px;
        }

        /* --- BOTÓN CERRAR SESIÓN --- */
        .sidebar-footer {
            margin-top: auto;
            padding: 20px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .logout-link {
            width: 100%;
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 14px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: var(--transition);
        }

        .logout-link:hover {
            background: var(--danger);
            color: white;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
        }

        @media (max-width: 768px) {
            .top-bar { padding: 15px 20px; }
            .content-area { padding: 20px; }
        }
    </style>
</head>
<body>

<div id="mySidenav" class="sidenav">
    <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
    <div class="sidebar-header">
        <i class="fas fa-chart-pie"></i>
        <h3>Admin Panel</h3>
    </div>

    <a th:href="@{/usuarios}">
        <i class="fas fa-users"></i> Usuarios
    </a>

    <div class="sidebar-footer">
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="logout-link">
                <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
            </button>
        </form>
    </div>
</div>

<div id="main">
    <header class="top-bar">
        <button class="open-btn" onclick="openNav()">
            <i class="fas fa-bars"></i> Menú
        </button>

        <div class="user-info">
            <span>Bienvenido, <b>Usuario</b></span>
            <div style="width: 35px; height: 35px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px;">U</div>
        </div>
    </header>

    <main class="content-area">
        <div class="card">
            <h2><i class="fas fa-shield-alt" style="color: var(--primary);"></i> Gestión de Usuarios</h2>
            <p>Bienvenido al panel central. Utiliza el menú lateral para gestionar las entidades, revisar pedidos y administrar los productos de la tienda de forma eficiente.</p>
        </div>
    </main>
</div>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
