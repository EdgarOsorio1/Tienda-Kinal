<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | ProyectoTienda</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --error: #ef4444;
            --success: #10b981;
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image:
                radial-gradient(circle at 10% 20%, rgba(59, 130, 246, 0.05) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(59, 130, 246, 0.05) 0%, transparent 20%);
        }

        .contenedor {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .tarjeta {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
        }

        .titulo {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        .subtitulo {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 30px;
        }

        /* Mensajes de Alerta */
        .mensaje {
            padding: 12px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 20px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .error {
            background: rgba(239, 68, 68, 0.1);
            color: var(--error);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .success {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        /* Formulario */
        .campo {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-muted);
            margin-left: 4px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 14px;
            transition: var(--transition);
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
            background: rgba(15, 23, 42, 0.8);
        }

        .boton {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 10px;
        }

        .boton:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .boton:active {
            transform: translateY(0);
        }

        /* Enlace de Registro */
        .footer-link {
            margin-top: 25px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .footer-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
        }

        .footer-link a:hover {
            text-decoration: underline;
            color: white;
        }
    </style>
</head>
<body>

<div class="contenedor">
    <div class="tarjeta">
        <h2 class="titulo">¡Bienvenido!</h2>
        <p class="subtitulo">Accede al panel de administración</p>

        <div th:if="${param.error}" class="mensaje error">
            <i class="fas fa-exclamation-circle"></i> Usuario o contraseña incorrectos
        </div>

        <div th:if="${param.logout}" class="mensaje success">
            <i class="fas fa-check-circle"></i> Sesión cerrada correctamente
        </div>

        <div th:if="${param.registered}" class="mensaje success">
            <i class="fas fa-user-check"></i> Registro exitoso. Inicie sesión.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="campo">
                <label for="username">Nombre de Usuario</label>
                <input type="text" id="username" name="username" placeholder="usuario" required>
            </div>

            <div class="campo">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="boton">
                Entrar al Sistema <i class="fas fa-arrow-right" style="margin-left: 8px; font-size: 12px;"></i>
            </button>
        </form>

        <div class="footer-link">
            ¿No tienes cuenta? <a th:href="@{/register}">Regístrate aquí</a>
        </div>
    </div>
</div>

</body>
</html>
